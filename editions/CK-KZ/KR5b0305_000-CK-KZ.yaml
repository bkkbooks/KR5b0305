body:
  text: 梅仙觀記梅仙事實仙壇觀道士楊智遠編昔梅仙君河南壽春府人名福字子眞乃西漢成帝時受命洪州南昌縣尉居官清節志厭浮華每以恤民爲念未嘗加鞭朴於民時值王莽作亂僭竊神器王鳳專政浸盛灾異數見群下莫不言福不忍天下生靈坐於塗炭乃奮忠義之氣上灾異書以陳治亂書曰臣聞箕子佯狂於商而爲周陳洪範叔孫通遁秦歸漢制作儀品夫叔孫先非不忠也箕子非疏其家而畔其親也不可與言也昔高祖納善如不及從諫若轉圜聽言不求其能舉功不考其素陳平起於亡命而爲謀主韓信拔於行陳而建上將故天下之士雲合歸漢爭進奇異知者竭其策愚者盡其慮勇士極共節怯夫勉其死合天下之知并天下之威是以舉秦如鴻毛取楚如拾遺此高祖所以無敵於天下也孝文皇帝起於代谷非有周召之師伊呂之佐也循高祖之法加以恭儉當此之時天下幾平繇是言之循高祖之法則治不循則亂何者秦爲無道削仲尼之跡滅周公之軌壞井田除五等禮廢樂崩王道不通故欲行王道者莫能致其功也武帝好忠諫說至言出爵不待廉茂慶賜不須顯中是以天下布衣各厲志竭精以赴闕庭自衒鬻者不可勝數漢家得賢於此爲盛使武帝聽用其計昇平可致於是積尸暴骨快心胡越故淮南王安緣間而起所以計慮不成而謀議泄者以眾賢聚於本朝故其大臣勢陵不敢和從也方今布衣迺窺國家之隙見聞而起者蜀郡是也及山陽亡徒蘇令之羣蹈名都大郡求黨與索隨和而無逃匿之意此皆輕量大臣亡所畏忌國家之權故匹夫欲與上爭衡也士者國之重器得士則重失士則輕詩云濟濟多士文王以甯廟堂之議非草茅所當言也臣誠恐身塗草野尸並卒伍故數上書求見輒報罷臣聞齊桓之時有以九九見者桓公不逆欲以致大也今臣所言非特九九也陛下距臣者二矣此天下士所以不至也昔秦武王好力任鄙叩關自鬻繆公行伯由余歸德今欲致天下之士民有上書求見者輒使詣尚書問其所言言可采取者秩以斗升之祿賜以一束之帛若此則天下之士發憤懣吐忠言嘉謀日聞於上天下條貫國家表裏燦然可睹矣夫以四海之廣士民之數能言之類至眾多也然其俊傑指世陳政言成文章質之先聖而不謬施之當世合時務若此者亦無幾人故爵祿束帛者天下之砥石高祖所以厲世磨鈍也孔子曰工欲善其事必先利其器至秦則不然張誹謗之網以爲漢歐除倒持太阿授楚其柄故誠能勿失其柄天下雖有不順莫敢觸其鋒此武帝所以辟地建功爲漢世宗也今不循伯者之道迺欲以三代選舉之法取當世之士猶察伯樂之圖求騏驥於市而不可得亦以明矣故高祖棄陳平之過而獲其謀晉文公召天王齊桓用其讎無益於時不顧逆順此所謂伯道者也一色成體謂之醇黑白雜合謂之駮欲以承平之法治暴秦之緒猶以鄉飲酒之禮理軍市也今陛下旣不納天下之言又加戮焉夫䳒鵲遭害則仁鳥爭逝愚者蒙戮則知士深退聞者愚民上疏多觸不急之法或下廷尉而死者眾自陽朔以來天下以言爲諱朝廷尤甚群臣皆順承上旨莫有執正何以明其然也取民之所上書陛下之所善試下之廷尉廷尉必曰非所宜言大不敬以此卜之一矣故京兆尹王章資質忠直敢面引廷諍孝元皇帝擢之以厲直臣而矯曲朝及至陛下戮及妻子且惡惡止其身王章非有反畔之辜而殃及家折直士之節結諫臣之舌羣臣皆知其非然不敢爭天下以言爲戒最國家之大患也願陛下循高祖之軌杜亡秦之路數御十月之歌當效無逸之戒除不急之法下無諱之詔博弗詢之謀及疏賤令深者不隱遠者不塞所謂辟四門明四目也且不急之法誹謗之微者也往者不可及來者猶可追方今君命犯而主威奪外戚之權日以益隆陛下不見其形願察其景建始以來日蝕地震以率言之三倍春秋水灾妄興比數陰盛陽微金鐵爲飛此何景也漢興以來社稷三危呂霍上官皆母后之家也親親之道全之爲右當與之賢師良傳教以忠孝之道今乃尊寵其位授以魁柄使之驕逆至於夷滅此失親親之大者也自霍光之賢不能為子孫慮故權臣易世則危書曰無若火始庸庸勢陵於君權隆於主然後防之亦無及已又言國舅王慢事帝俱不納復建三統書曰臣聞不在其位不謀其政政者職也位卑而言高者罪也越職觸罪危言世患雖伏質橫分臣之願也守職不言没齒身全死之日尸未腐而名滅雖有景公之位伏櫪千駟臣不貪也故願壹登文石之陛涉赤墀之塗當戸牖之法坐盡平生之愚慮無益於時有遺於世此臣寢所以不安食所以忘味也願陛下深省臣言臣聞存人所以自立也壅人所以自塞也善惡之報各如其事昔者秦滅二周夷六國隱士不顯逸民不舉絶三統滅天道是以身危子殺厥孫不嗣所謂壅人以自塞也故武王克殷未下車存五帝之後封殷於宋紹夏於杞明著三統示不獨有也是以姬姓半天下遷廟之主流出於戸所謂存人以自立者也今成湯不祀殷人無後陛下繼嗣久微殆爲此也春秋經曰宋殺其大夫穀梁傳言其不稱名姓以其在祖位尊之也此言孔子故殷後雖不正統封其子孫以爲殷後禮亦宜之何者諸侯奪宗聖庶奪嫡傳曰賢者子孫宜有土而況聖人又殷之後哉昔成王以諸侯禮葬周公而皇天動威雷風著灾今仲尼之廟不出闕里今孔氏子孫不免編戸以聖人而歆匹夫之祀非皇天之意也今陛下誠能據仲尼之素功以封其子孫則國家必獲其福又陛下之名與天無極何者追聖人素功封其子孫未有法也後聖必以爲則不滅之名可不勉哉帝亦不報於是有歸休之志烏乎所謂臣之於君再三諫而不從則逃之此豈虛言哉遂解衣掛冠東都門納官棄妻子去九江恐國舅攝之易姓名爲吳門市卒以保其身厥後求師慕道訪山採藥多隱名山廣谷之間嘗與張留侯子房執版唱無生曲以快其情也訪鴈蕩諸山即會稽之南也遊南閩入支提山修鍊數年未就爲尼所觸憤然曰靈丹九轉愈久愈精何厭成功之晩遂入仙霞山即武夷之東也徬徨乎無人之境逍遥乎塵埃之外猿啼古木虎嘯幽岩有竹曰瘦腰有草名黃芽靈苗異種雜然莫能盡識遂依岩結庵堅心苦志辟穀餐松慕學神仙積有年矣每望閩越間有紫氣頗異復往建城立壇修鍊未幾一日山色溟濛煙霞滿室瑞氣浮空紫雲蓋覆於山頂天樂嘹喨有一神人語福曰空洞仙君至須㬰仙樂近仙君臨福拜而迎之仙君曰念子學道志堅吾故下臨授汝外燒内鍊還返大丹之法九老仙都濟世之文汝可擇名山依法修鍊方得成仙言竟而梅君謝焉彩雲散空天樂自鳴仙君乃隱隱而去梅君精視天文數日下山行濟世之法無不靈驗初至鷄籠山修鍊被尸鬼相魔次至毛竹洞夜夢神人曰此山非先生修鍊之所遂入演仙山修鍊又爲野火所燒繼往玉華山修鍊昔神人居焉方欲修鍊而羣賊四起次至烏石山修鍊樵婦觸之梅君嘆曰道緣淺薄障魔羣起遂再行濟世之法數年至劍江西嶺修鍊一日祥雲瑞氣覆於山巔開房視之乃道師空洞君降梅君拜而迎之告道師曰弟子恭依師旨廣行濟世之法遊歷名山修鍊多爲魔苦適至於此道師曰汝之道緣在飛鴻山也再授汝八神却魔靈丹乃召二光童子控赤𩦲白馬於山前君可急乘馬領童至飛鴻山精修成功之日吾當舉汝使汝骨像同昇也言訖道師隱於雲中梅君遂乘馬領童至飛鴻山卓庵修鍊千日神遊體外丹光燭天而道成矣遂開爐出丹一丸祭天天神收之一丸祭地地神護之一丸自服服訖拜謝天地畢地神奏於三官三官奏聞天闕言西漢梅福成道於飛鴻山梅君乃乘白馬領童欲回九江二童馬前撫掌吟詩隱於山溪巨石之下須臾紅光射日紫霧漫空甘露天花一時飛降雲中仙樂嘹喨金童持節玉女執旛力士控鸞侍仙捧詔向梅君曰天闕詔下令汝乘鸞上昇梅君拜謝天恩棄馬乘鸞昇天而去白馬墜於水中自後飛鴻山號曰梅仙山是也山之西有墜馬州三十里有遺鞭蓍山山之下有登仙里山之東溪有逃童石驂馬渡山之側有甘露源山之後有天花嶺石上有花跡自後鄉人號曰癞石嶺是也至今丹光隱伏猶存山根有梅君道院崇奉香火自後浮屠占之爲居址棄仙像塑佛像改名觀音院將梅仙像移入開山堂安奉郡之民相傳只呼梅仙院不從其額其院中有護法五聖公顯靈立廟院側人只呼作梅君廟梅君同其名乃仙聖跡也自漢至今厯二十二丙寅矣自元始中至今貞元二年丙申計壹千二百五十九年不泯矣時依建寧府梅仙堂傳本彼有梅山鍊丹之所故云爾梅先生碑唐浙江東道觀察判官檢校戸部郎中兼御史中丞賜紫金魚袋羅隱撰漢成帝時綱紀頽壞先生以書諫天子者再三夫火政須去而劍履間健者猶數百位尚不能爲國家出力以斷佞臣頭復何南昌故吏憤憤於其下得非南昌遠地也尉下僚也苟觸天子網突倖臣牙止於殛一狂人噬一單族而已彼公卿大臣有生殺喜怒之任有朋黨蕃衍之大至於出一言作一事必與妻子謀苟不便其家雖妾人婢子亦攖挽相制而況親戚乎況骨肉乎故雖有憂社稷心亦噤而不吐也烏乎寵祿所以勸功而位大者不語朝廷事是以天下有道則正人在上天下無道則正人在下予讀先生書未嘗不爲漢朝公卿恨今南遊復過先生里吁何爲道之多也書梅先生碑陰大山蕭山明豐城梅仙山道觀有梅先生碑唐詩人羅隱文也昨觀與碑俱燬道士熊應祥叶力鼎新之碑再立友羅永之來委予書之問之曰君昭諫遠孫揚前文人文勤如是爲楷書竟思漢事追歎之烏乎天欲福漠之天下故生一福之賢畀之漢棄天福乃棄人之福兩自棄是自禍也金鐵交飛天無如漢何老鳳變妖漢亦無如新之移漢何烏乎失士則亡得士則存存以從諍亡以玩言壯哉氣節貫于乾坤視我泥土藏我璵璠辭漢去坐隱吳市門馳跡仙路訴情帝閽泯泯者劉長空無痕永永者梅徧祠共尊祠碑可灰仙道不燔青瑶重鐫可字可捫昭諫有知醒如氷魂子眞如生日月不昏咸淳六年嵗在庚午六月朔書梅先生碑後小山蕭泰來讀昭諫碑非惟得先生心抑增先生氣今梅壇在處有之尊其人故多其祠蘇長公有云神在天下如水之在地中無所往而不在耶宋勅誥尚書省牒中書省奏尚書省送到祠部奏據太常寺狀准送下鎭南軍奏狀據豐城縣申勘會到宣風鄕南岐里梅仙壇觀委是國家逐年祭醮每遇水旱人民祈禱皆有感應委得詣實州司檢會昨據梅仙壇觀道士楊智遠狀本觀元係漢朝梅福遺跡之所古壇丹井庵基見存觀宇已是漢代興建名垂典祀乞奏聞賜眞君名號州司所據前項申述切以福之偉節忠論布在史策可考而見晚避逆莽棄妻子去九江全性吳市門世傳以爲仙今遺跡具存觀宇嚴飭水旱疾癘有禱即應伏望特賜寵號以稱遠民祈報之意會到本州自來只稱呼梅眞人當寺參詳漢朝梅福眞人加封申候指揮本部今據太常寺狀伏候勅旨元豐年加封牒奉勅梅福在漢之際數以孤遠極言天下之事其志壯哉晩而家居讀書養性卒於遺俗高蹈世傳爲仙今大江之西實存廟像禱祠輒應能澤吾民有司上聞是用錫兹顯號光靈不泯其服朕恩宜特封夀春眞人牒至准勅故牒元豐五年七月尚書禮部勘會近據尚書省送下錄黃鎮南軍豐城縣梅仙觀漢朝梅福勅特封夀春眞人其勅牒令本觀收掌及差官往彼精䖍祭告及造牌額安掛已符本處具已施行及收管勅牒文狀申省去訖今來多日未見回申須議催促鎮南軍主者詳前去今來符内事理疾速囘申不管准前稽遲符到奉行元豐五年八月十二日洪州元豐五年八月二十三日准本年七月二十九日太常寺牒准尚書禮部符准元豐五年七月十八日尚書省送下畫黃中書省奏尚書省送到祠部奏據太常寺狀准送下鎮南軍奏狀據豐城縣申勘到宣風南岐里梅仙壇觀委是國家逐年祭醮每遇水旱人民祈禱皆有感應委是詣實州司檢會昨據夀聖梅仙觀道士楊智遠狀本觀元係漢朝梅福遺跡之所古壇丹井庵基見存觀宇乃是漢代興建名垂典祀乞奏聞賜眞君名號州司所據前項申述切以福之偉節忠論布在史策可攷而知晩避逆莽棄妻子去九江全性吳市門世傳以為仙今遺跡具存觀宇嚴飾水旱疾癘有禱輒應伏望特賜寵號以稱遠民祈報之意會到本州自來只稱號梅眞人當寺參詳漢朝梅福眞人加封申候指揮本部今據太常寺狀伏候勅旨今月十四日奉聖旨如前應有合行事件檢會舊例施行奉勅如右牒到奉行前批已降勅命封號訖七月十八日未時付禮部依聖旨指揮施行仍關合屬去處太常寺主者詳畫黃指揮應有合行事件疾速施行符到奉行牒到請詳前項尚書禮部符内聖旨指揮施行者勅梅福在漢朝之際數以孤遠極言天下之事其志壯哉晩而家居讀書養性卒於遺俗高蹈世傳爲仙今大江之西實存廟像禱祠輒應能澤吾民有司上聞是用錫兹顯號光靈不泯其服朕思宜特封壽春眞人元豐五年九月洪州所准尚書禮部符内詳畫黃指揮差官往豐城縣壽聖梅仙壇觀精虔祭告勅封壽春眞人及造牌額安掛其所降到勅牒令本觀收掌訖具已施行收管文狀申省者右具上件牌額州司製造用金貼字號已於今月十九日了當交付本觀道士歸觀及差人賫祭文一道前去外帖豐城知縣張長官仰照會候到依時尚書禮部符内前項指揮速便前去本觀精虔祭告及安掛牌額訖具事狀申州元豐五年十月十九日勅朕嚮巡狩於南國以豫章爲東朝母后率掖庭而行舟楫冒風波之險凡所經涉必有護持爰錫褒恩以答神貺洪州豐城大江北岸梅福昇仙壇觀夀春眞人正諫不用高名獨存憫漢室之不綱去吳市而不返旣嚴祠館亦賜封名兹復益於美稱蓋少敷於新渥其歆異眷用慰平生可特封壽春吏隱眞人奉勅如右牒到奉行紹與二年閏四月十八日題詠梅先生贊梅仙子眞補吏南昌去求假傳爰貢皁囊指世陳政厲志竭精美高絀秦斥鳳伸章謂當察景亡失其柄允矣多士爲國重器眾賢聚朝人斯畏忌何以徠之道在砥礪䳒鵲遭害仁烏增逝毋爲按圖求驥於市爰述孔裔宜後成湯綿嘉崇德自我推明由鳳及莽遂解漢綱防之無及吾言有徵逝將遠遊乘雲帝鄕題梅仙館孟水部賓于仙界路遥雲縹緲古壇風冷葉蕭騷後來豈合言淹滯一尉昇騰道最高梅先生故居黃太史庭堅吳門不作南昌尉上疏歸來朝市空笑拂巖花問塵世故人子是國師公寄梅仙觀楊道師蘇黃門轍道師住在眞人峰欲往見之路無蹤去年許我入城市塵埃暗天待不至莫往莫來勞我心道書寄我千黃金蠒衣肉食慮謀短文字滿前看不見口傳指授要有時脫去羅網當見知梅翁漢朝南昌尉手摩龍鱗言世事一朝拂衣去不還身騎白麟翳紅鸞我今雖復墮塵土道師何不與我語他年榮足投名山相逢拍手一破顏題梅仙館楊次公傑天下人心愛至忠天心還與世人同自生羽翼三清去不獨丹砂九轉功漢代變名遊越國道家遺像立蕭公石壇正是飛昇處老鶴一聲松檜風題梅仙觀洪龜父朋炎靈夫其御四海無安稅烏乎梅南昌脫屣元始嵗小臣披肝膽宮掖事嚴秘上書竟渺茫棄擲江湖外一朝厭蝸角萬里寄鵬背向來殺青上此事美無對到今瑤池地風露翔孔翠仰瞻神界遊干載想生氣願爲龍鱗嬰勿學蟬骨蛻題梅山陳闡先生吏隱寄南昌千里來尋物外鄕汲水尚憐春井渫藏丹猶發夜壇光鶴歸華表人何在犬吠深雲日自長我擬重來訪遺跡手搘笻杖少徜徉題梅仙館朱令粹書投北闕言無用吏隱南昌寄此間身陟九霄歸紫府名垂千古寄青山夜壇星斗誰瞻仰曉殿雲煙自往還幾疊高峯人罕到分明眞境異塵寰乙卯禱雨梅壇嚴令椿齡大隱清名格帝閽眞人新寵粲王言南昌補吏官雖小北極通班道更尊諫疏不容强漢室仙風聊復傲吳門我來物色朝元處山遶星壇水遶村題梅壇臨川令呂防封事悠悠即掛冠蒼煙古木鎖空壇當時不識蓬萊客祗作南昌一尉看題梅仙觀嘗讀子眞傳掩卷屢長嘆如何忠正資適在元成間危言論時政條暢窮根源直節破姦膽憤氣衝儒冠上書輒報罷九九慚齊桓是時公卿輩曾不爲厚顔雄文燦方冊至今日星攢深機識禍福拂衣九江千一朝棄妻子變姓抱吳關位卑而言高自古爲尤難斯人能保身出處何其艱繄子偶得邑駕言謁仙壇壇側千丈松凜凛清風還壽春下新詔高蹈翠琰刊壁間羅隱記中理極可觀當年康樂公遊覽逼名山云何此佳蹟未被金石言眞人久悵望佇看西飛鸞題梅仙觀馬內翰子才漢綱解宏紐國命移權臣太阿有神鋒顚倒柄在人公卿雖滿前有語各自吞張禹爲帝師此是禍亂根天子辟左右決機在一言不爲社稜計祗乞兒女恩上方斬馬劍當時負朱雲谷永對直言天庭策災氛陰謀助元惡歸咎昭陽嬪豺狼自此縱白晝當路蹲先生當是時上書叩帝閽耿耿禍福語皎皎星與辰天門鎖九重一門萬夫屯小臣江湖心何由達至尊賊莽果盗國忠烈遭烹焚先生變名姓爲卒吳市門浮雲去無蹤世人以爲仙蓬山在何處此事且勿論但愛清風高凛凛久益新我來拜遺像舊宅荒基存元豐發新詔玉牒封壽春老松益勁色嵗飽霜當痕直上絕頂壇天風吹衣巾細讀壁間書頗喜羅隱文恨歎有鯁語使我氣益振回視飽食徒茫茫如埃塵寄題梅壇御史蔣之奇昔我承乏江西官豫章聖跡無不觀如何復有此遺恨獨我不到梅仙壇梅仙壇在豐城界眞風爽氣埃塵外當年補尉向南昌才譽雖高官未大漢成帝時綱紀壞先生諫書至於再前擢王章矯曲朝戮及妻子仇黨快羣臣知非不敢爭遂令天下言爲戒烏乎此語誠甚危譏切權强何慷慨借令觸突倖臣牙噬一覊單未爲害公卿大臣噤不吐彼爲私謀安足怪正人在下吁可悲變名吳市復誰知元豐勑書爲旌表故庵丹井存遺基壽春眞人錫顯號稱其高蹈與俗遺先生雖不遇於昔而遇于今蒙獎飭令丞作書譽忠直潛德幽光燀無極題梅山天師張景先作尉南昌日投書北闕頻忠言不悟主直節恥爲臣漢室多災異吳門念隱淪掛冠忘寵辱蒙袂出埃塵虹屈英雄氣鷗羣自在身永懷三洞訣高謝九江春擇地開仙館看雲剪壽巾玄臺秋步月虛室夜凝眞無夢生芳草留年養大椿碧茸香不斷青馬性偏馴太液刀圭就中黃道路新武夷空墜馬郁木竟棲神絳節雖朝帝靈波尚濟民一石傳舊史千古事嚴禋瑞氣生仙藥清風付羽人壇遺金鼎像井鎖玉華津地接洪崖府溪通劍水濱鶴歸雲抖擻龍起石鱗皴已悟身爲患元期德有鄰青山不忘我今日是天親題梅山二首范仁仲袖凛摧姦劍拂霜奈何不報疏三章南昌一尉孤忠日西漢諸王百沸湯便覓赤松爲伴去何求青史把名揚想疑九轉丹成後憤吐精裹訴玉皇說到神仙事渺茫壽春亘古此靈場松邊白隱千年鶴嶺外紅拖幾夕陽霞馭月寒時弄影斗壇風冷夜聞香先生不必眞人號自與乾坤共久長題梅仙觀陳藏一進了忠言隱姓名萬年香火此山靈可憐沉醉功名者血染咸陽喚不醒題梅壇左蜀王時彥梅尉孤忠揭芳名千古傳官卑奚意隱心正即神仙敢諫憂時切爲臣願主賢旌陽稱令尹對峙是丹泉題梅仙壇清江劉霆午吏隱清風幾百年長松脩竹滿壇前漢皇若聽三書諫未必先生便肯仙題梅壇火德中微否未傾朝陽一疏鳳先鳴如公忠論能旋聽彼莽姦謀未可成萬古仙名香宇宙幾人遺臭腐公卿至今風吼松聲怒似爲先生訴不平王伯範朝喑仗馬夕箋天漢事于今已幾年一片孤忠應尚在定須耿耿斗牛邊宿梅仙壇張廣漢夜宿梅壇境山寒萬籟空無才供吏隱有夢憶仙翁石齒含殘雪松髯奮急風竈煙如可䑛跨鶴問鴻濛題梅壇鍾訧萬松護嶺與天齊中有眞人舊隱棲井冷尚留丹汞暖壇高近拜斗星低回思漢事成惆悵浪費今人爲品題我欲從之無路去同昇不似許仙雞胡發忠肝一點炳如月世事難將道眼看駕取雲軿昇斗府惟遺巖壑拱仙壇遊梅壇有感臨川吳季先小立仙壇挹斗箕著身高處覺天低南昌吏隱清風在喚醒時人局面迷賡梅山壁間韻古旴鄧夢杰愧我身名墮褐冠無因安得到仙壇子眞雖隱名難隱萬古高風凜凜寒題梅山東嘉趙必橦一隱吳門訪此山深憐漢鼎尚多艱片言倘得回天聽未必仙名滿世間題梅壇曹仙家漢代梅君此鍊丹古壇翠駁蘚花斑目窮鳥道青天遠榻轉松陰白日閑煙隔樓臺分象外風吹鍾磬落人間不知乘詔冲昇後幾度飛鸞到舊山新昌張異上疏歸來日已西山中旋製薜蘿衣謀身豈爲金丹祕去國應知火祚移風露滿林蟬幾蛻松杉遶屋鶴孤飛瓣香僕僕非公願自有忠誠天地知古樹枯藤知幾年衣冠來此豈徒然波濤平地難囘首風雨深山旦熟眠吾道有靈終用世此心無愧可通天功名分定從吾好未許驅馳效執鞭立春寄梅壇楊逸老范太中仕路蹉跎又見春區區深厭走紅塵未能解脱無窮事長憶逍遥自在人瓦缶汲泉朝灌藥羽衣濛露夜朝眞灑然物外清虛境呼吸淳元養氣神題梅壇毛慶甫雲悅樓蕭泰來樓立梅峯最上頭日隨元氣與浮游道心快活雲心似飛去飛來得自由一收二百里間雲詩几琴窗總向君獨樂何如同樂好闌干欠著老夫分題梅山雲悅樓約山朱行父和衣高卧白雲堆門倩雲封不妄開留向山中自娛悅莫教一片出山來自堂陳杰白衣蒼狗無情物翻手悲懽變古今輸與道人長快活看渠起滅不關心後林李義山雲本無心悅者誰華陽去後少人知欲分半席無因到一片飛來是覔詩蜀人王時彥一生活計一身閑日與白雲相往還五百年間知此味華山去後到梅山林隱羅永之曾讀楊詩識懶雲只今雲悅即雲孫龍無怒色常歸匣鶴有懽顔獨守門春態樂尋吟客伴心閑喜共野人言要知出岫晴方好樓外濛濛煙雨昏初堂胡宏子世人之所悅多在紛華間毛仙得趣處白雲滿青山飛樓俯空曠登眺長怡顏迹與雲俱高心與雲俱閑八極梅眞人乘雲相往還我亦懶出岫時歸坐雲關清吟抱幽獨何當共凭闌崔次周仙人好樓居天上多瓊樓祥氛結紫炁磅礴常周流道人仙之裔居然梅山頭山頭聳百尺日與雲從游靜嘿觀內景繚繞雲氣浮軒豁挹西爽天淨雲影收倚闌暢今情筆硯雲煙稠領客譚又玄滿吸雲腴甌不用分半間盤結任相謬怡然自可悅澹然亦何求悅則動靜隨呼吸聽去留我欲乘之叩太虛相與上下追仙斿鞭鸞笞鳳汗漫去下視八表揮斥凌九州鍾訧我匪悅雲雲悅我雲兮與我一無心知君只愛雲中隱不肯出山無處尋李君式無心出岫道人閒身在虛無飄緲問可惜雲霓人在望捲將雲雨入梅山題梅山薛修竹薜荔壇高秋十分漢時笙鶴杳無聞平明一覺西風夢吹落人間半是雲
